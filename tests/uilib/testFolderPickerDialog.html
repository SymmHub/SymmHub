<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Test FolderPickerDialog</title>
    <link rel="stylesheet" href="../../lib/uilib/css/uilib.css"/>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color));
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container-premium {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin-top: 0;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .controls {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            color: white;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #log {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            color: #e2e8f0;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.85rem;
            padding: 16px;
            border-radius: 8px;
            min-height: 150px;
            max-height: 350px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .ok { color: #4ade80; font-weight: 600; }
        .warn { color: #fbbf24; }
        .err { color: #f87171; }
    </style>
</head>
<body>
    <div class="container-premium">
        <h2>FolderPickerDialog Tester</h2>
        <p>Interactive test environment for verifying the modal tree-view folder picker dialog.</p>
        
        <div class="controls">
            <button id="btnOpenPicker">Open Folder Picker</button>
        </div>

        <div id="log"><span class="warn">No folder selected yet.</span></div>
    </div>

    <script type="module" src="js/testFolderPickerDialog.js"></script>
</body>
</html>
