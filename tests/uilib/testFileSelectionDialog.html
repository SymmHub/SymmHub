<!DOCTYPE html>
<html lang="en">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

<head>
    <title>Test FileSelectionDialog</title>
    <link rel="stylesheet" href="../../lib/uilib/css/uilib.css"/>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        #controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        button {
            padding: 8px 18px;
            border: 1px solid #aaa;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 0.95rem;
            box-shadow: 0 2px 6px #0002;
        }
        button:hover { background: #e8f0ff; }
        #log {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: monospace;
            font-size: 0.85rem;
            padding: 12px 16px;
            border-radius: 8px;
            min-height: 120px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            box-shadow: 0 2px 8px #0003;
        }
        #log .ok   { color: #6ec98f; }
        #log .warn { color: #e8c84a; }
        #log .err  { color: #f47070; }
        label { font-weight: 600; margin-right: 4px; }
        select {
            padding: 6px 10px;
            border-radius: 5px;
            border: 1px solid #aaa;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
<h2 style="margin-top:0">FileSelectionDialog – Test</h2>

<div id="controls">
    <div>
        <label for="filterSel">Filter:</label>
        <select id="filterSel">
            <option value="json" selected>json (presets)</option>
            <option value="image">image</option>
        </select>
    </div>
    <button id="btnShow">Show Dialog</button>
    <button id="btnReselect">Re-select Folder</button>
    <button id="btnReload">Reload Folder</button>
    <button id="btnHide">Hide Dialog</button>
</div>

<div id="log"><span class="warn">No file selected yet.</span></div>
</body>

<script type="module" src="js/testFileSelectionDialog.js"></script>
</html>
